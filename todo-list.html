<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Todo List</title>
        <link rel="icon" href="favicon.png" type="image/png">
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="min-h-screen flex flex-col bg-slate-50 text-slate-800">
<!--HEADER + NAVIGATION BAR STARTS-->
    <header class="bg-white border-b">
      <nav class="max-w-5xl mx-auto px-4 py-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <a href="index.html" class="text-lg font-bold text-slate-900">Can Gere</a>
        <div class="flex flex-wrap gap-2">
          <a href="index.html" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-slate-100 transition hover:scale-110">Home</a>
          <a href="projects.html" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-slate-100 transition hover:scale-110">Projects</a>
          <a href="contacts.html" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-slate-100 transition hover:scale-110">Contact</a>
          <a href="todo-list.html" class="px-3 py-2 rounded-md text-sm font-medium bg-slate-900 text-white hover:bg-slate-800 transition hover:scale-110">Todo List</a>
        </div>
      </nav>
      <div class="max-w-5xl mx-auto px-4 pb-6 text-center">
        <h1 class="text-3xl font-extrabold text-slate-900">Todo-List</h1>
        <p class="mt-2 text-slate-600">Manage your tasks quickly and save them in your browser.</p>
      </div>
    </header>
<!--HEADER + NAVIGATION BAR ENDS-->


<!--MAIN ELEMENT STARTS-->
    <main class="w-full max-w-5xl mx-auto px-4 py-8 ">
      <section class="bg-white rounded-xl border shadow-sm p-6 md:p-8">
        <!--ADD TASK-->
        <div class="flex flex-col sm:flex-row sm:items-end sm:gap-3 gap-2">
          <div class="flex-1">
            <label for="taskInput" class="block text-sm font-medium text-slate-700">New task</label>
            <input id="taskInput" type="text" placeholder="Add a task..." class="mt-1 w-full border rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-500" />
          </div>
          <button id="addTaskBtn" class="px-4 py-2 rounded-md bg-slate-900 text-white font-semibold hover:bg-slate-700 transition">Add Task</button>
        </div>

        <!--FEEDBACK AREA-->
        <div class="mt-3 text-sm text-red-600" id="feedback"></div>

        <!--COUNTERS-->
        <div class="mt-6 grid sm:grid-cols-2 gap-3">
          <div class="rounded-lg border p-3 bg-slate-50">
            <p class="text-xs uppercase tracking-wide text-slate-500">Total tasks</p>
            <p id="totalCount" class="text-2xl font-bold text-slate-900">0</p>
          </div>
          <div class="rounded-lg border p-3 bg-slate-50">
            <p class="text-xs uppercase tracking-wide text-slate-500">Completed / Remaining</p>
            <p id="completedCount" class="text-2xl font-bold text-emerald-600">0</p>
            <p id="remainingCount" class="text-slate-600">0 remaining</p>
          </div>
        </div>

        <!--TASKS-->
        <div class="mt-5 border-t pt-4">
          <div id="taskList" class="space-y-2"></div>
          <div id="emptyMessage" class="mt-2 p-3 rounded-md bg-slate-50 border border-dashed text-slate-500">
            Your to-do list is empty. Add your first task to get started.
          </div>
        </div>
      </section>
    </main>
<!--MAIN ELEMENT ENDS-->

<!--FOOTER pushed this to bottom with flex-col and min-h-screen at body, mt-auto at footer-->
    <footer class="bg-white border-t mt-auto">
        <div class="max-w-5xl mx-auto px-4 py-6 text-center text-sm text-slate-600">
            <p>&copy; 2026 Can Gere</p>
            <a href="https://instagram.com/cangeree" target="_blank" class="inline-block mt-2">
                <img src="instagram-icon.png" alt="Instagram" class="w-6 h-6 inline">My Instagram
            </a>
        </div>
    </footer>


<!--JAVASCRIPT-->
    <script>
      //add checking if the same task exists or not, if exists show feedback that task already exists, if not add the task --> (DONE)
      //might add edit button to edit tasks,clear all button to clear all tasks --> (ONLY ADDED EDIT BUTTON NO NEED FOR CLEAR ALL)
      //when tasks are long enough it can exceed the div elements width --> (ADDED BREAK-WORDS TO TASK TEXT MADE BUTTONS FLEX) 

      // get all the necessary elements
      const taskInput = document.getElementById('taskInput');
      const addTaskBtn = document.getElementById('addTaskBtn');
      const taskListEl = document.getElementById('taskList');
      const feedbackEl = document.getElementById('feedback');
      const totalCountEl = document.getElementById('totalCount');
      const completedCountEl = document.getElementById('completedCount');
      const remainingCountEl = document.getElementById('remainingCount');
      const emptyMessageEl = document.getElementById('emptyMessage');

      const STORAGE_KEY = 'portfolioTodoTasks';
      // load tasks from localStorage
      let tasks = loadTasks();

      function loadTasks() {
        const saved = localStorage.getItem(STORAGE_KEY);
        console.log('Loaded tasks from storage:', saved);
        if (saved) {
            return JSON.parse(saved);
        }
        else{
            return [];
        }
      }
      //save tasks to local storage
      function saveTasks() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
      }

      //rendering the tasks into the list
      function renderTasks() {
        taskListEl.innerHTML = '';
        //if tasks not empty make the emptymessage element hidden
        if (tasks.length === 0) {
          emptyMessageEl.classList.remove('hidden');
        } else {
          emptyMessageEl.classList.add('hidden');
        }

        tasks.forEach((task) => {

          //elements for task
          const item = document.createElement('div');
          item.className = 'flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 p-2 border rounded-md bg-white';

          //complete button's frame
          const left = document.createElement('div');
          left.className = 'flex items-start flex-1 min-w-0 gap-2';

          //compete button
          const completeButton = document.createElement('button');
          completeButton.className = task.completed ? 'w-5 h-5 rounded-full bg-emerald-500 text-white flex items-center justify-center'
            : 'w-5 h-5 rounded-full border border-slate-400 bg-white';
          completeButton.innerHTML = task.completed ? '✓' : '';
          completeButton.addEventListener('click', () => toggleComplete(task.id));

          //the task itself
          const text = document.createElement('div');
          text.className = task.completed ? 'break-words line-through text-slate-400 min-w-0' : 'break-words text-slate-800 min-w-0';
          text.innerHTML = task.title; //writing tasks name

          //delete buttons frame
          const right = document.createElement('div');
          right.className = 'flex flex-wrap gap-2 sm:flex-nowrap sm:justify-end';

          //delete button
          const deleteButton = document.createElement('button');
          deleteButton.className = 'px-2 py-1 rounded-md bg-red-500 text-white text-xs hover:bg-red-600';
          deleteButton.innerHTML = 'Delete';
          deleteButton.addEventListener('click', () => deleteTask(task.id));
          
          //edit button 
          const editButton = document.createElement('button');
          editButton.className = 'px-2 py-1 bg-yellow-500 text-white text-xs hover:bg-yellow-600 rounded-md';
          editButton.innerHTML = 'Edit';
          editButton.addEventListener('click', () => editTask(task.id));
          if(task.completed){
            editButton.classList.add('hidden');
          }

          //editing mode for the task
          if(task.isEditing){
            //editing mode elements
            const editWrapper = document.createElement('div');
            editWrapper.className = 'flex flex-col sm:flex-row min-w-0 w-full  gap-2';

            //input for editing the task
            const editInput = document.createElement('input');
            editInput.type = 'text';
            editInput.className = 'px-2 py-1 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500';
            editInput.value = task.title;

            //buttons for editing mode
            const actionsButtons = document.createElement('div');
            actionsButtons.className = 'flex gap-2';

            //save button for editing mode
            const saveButton = document.createElement('button');
            saveButton.className = 'px-2 py-1 bg-blue-500 text-white text-xs hover:bg-blue-600 rounded-md';
            saveButton.innerHTML = 'Save';

            //cancel button for editing mode
            const cancelButton = document.createElement('button');
            cancelButton.className = 'px-2 py-1 bg-gray-500 text-white text-xs hover:bg-gray-600 rounded-md';
            cancelButton.innerHTML = 'Cancel';

            editButton.classList.add('hidden'); //hide the edit button when editing 

        

            //if user presses enter while editing the task, save the task
            editInput.addEventListener('keydown', (event) => {
              if (event.key === 'Enter') {
                saveButton.click();
                saveTasks();
                renderTasks();
                showFeedback('Task updated.', false);
              }
            });

            //if empty input disable the save button and show feedback, if not empty enable the save button
            editInput.addEventListener('input', () => {
              const newTitle = editInput.value.trim();
              if (newTitle) {
                saveButton.disabled = false;
                saveButton.classList.remove('opacity-50', 'cursor-not-allowed');
              } else {
                saveButton.disabled = true;
                saveButton.classList.add('opacity-50', 'cursor-not-allowed');
                showFeedback('New title must not be empty.', true);
              }
            });

            //save button event listener to save the changes and exit editing mode
            saveButton.addEventListener('click', () => {
              const newTitle = editInput.value.trim();
              if (newTitle) {
                task.title = newTitle;
                task.isEditing = false;
                saveTasks();
                renderTasks();
                showFeedback('Task updated.', false);
              }
            });

            //cancel button event listener to exit editing mode without saving changes
            cancelButton.addEventListener('click', () => {
              task.isEditing = false;
              renderTasks();
              showFeedback('Edit cancelled.', false);
            });

            //appending save and cancel buttons to the editing mode button wrapper, then appending the input and the buttons to the left side of the task item
            actionsButtons.append(saveButton, cancelButton);
            editWrapper.append(editInput, actionsButtons);
            left.append(editWrapper);
          }else{ 
            left.append(completeButton, text); //append complete button and text if not in editing mode
          }

          
          //appending parts of the task with completebutton+taskname+delete button
          right.append(editButton, deleteButton);
          item.append(left, right);

          //appending the tasks
          taskListEl.appendChild(item);
        });

        updateCounters();
      }

      //dynamically change counters
      function updateCounters() {
        const total = tasks.length;
        const completed = tasks.filter((t) => t.completed).length;//filtering out the completed tasks to count them
        const remaining = total - completed;

        totalCountEl.innerHTML = total;
        completedCountEl.innerHTML = `${completed}`;
        remainingCountEl.innerHTML = `${remaining} remaining`;
      }

      //feedback for user if operation is successful or not 
      //@param change isError flag when calling the function to show if feedback is positive
      function showFeedback(message, isError = true) {
        feedbackEl.innerHTML = message;
        feedbackEl.className = isError ? 'mt-3 text-sm text-red-600' : 'mt-3 text-sm text-emerald-600';
      }

      function addTask() {
        const title = taskInput.value.trim();
        if (tasks.some((t) => t.title.toLowerCase() === title.toLowerCase())) {
          showFeedback('Task already exists. Please enter a different task.');
          return;
        }
        
        
        if (!title) {
          showFeedback('Please enter a non-empty task.');
          return;
        }
        
    
        tasks.push({ id: Date.now().toString(), title, completed: false, isEditing: false}); //adding tasks to localstorage
        saveTasks();                                                                         //saving tasks to localstorage
        renderTasks();//show the newly added task

        taskInput.value = '';//make taskinput empty for next task 
        showFeedback('Task added.', false);
      }

      
      function toggleComplete(taskId) {
        const task = tasks.find((t) => t.id === taskId);//finding the task to be toggled by id
        if (task) {
          task.completed = !task.completed;//change the status of the task

        }
        saveTasks();
        renderTasks();
        showFeedback('Task status updated.', false);
      }


      function deleteTask(taskId) {
        tasks = tasks.filter((task) => task.id !== taskId);//filtering out the task to be deleted
        console.log('Deleted task with id:', taskId);
        saveTasks();
        renderTasks();
        showFeedback('Task deleted.', false);
      }

      //flagging the task to be edited 
      function editTask(taskId){
        const taskToBeEdited = tasks.find((t) => t.id === taskId);
        taskToBeEdited.isEditing = true;
        console.log('Editing task:', taskToBeEdited.title);
        saveTasks();
        renderTasks();
      }

      //event listeners for add task button and enter key
      addTaskBtn.addEventListener('click', addTask);
      taskInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') addTask();
      });

      renderTasks();
    </script>

        
    </body>
</html>
